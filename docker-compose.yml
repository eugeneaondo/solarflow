version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: solarflow-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - solarflow-network

volumes:
  mosquitto_data:
  mosquitto_logs:

networks:
  solarflow-network:
    driver: bridge6
